name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  MANIFESTS_REPO: ${{ github.repository }}-manifests

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Generate release manifest
        run: |
          VERSION="${{ github.ref_name }}"
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION#v}" make build-installer

      - name: Push OCI artifact
        run: |
          flux push artifact oci://${{ env.REGISTRY }}/${{ env.MANIFESTS_REPO }}:${{ github.ref_name }} \
            --path="./dist" \
            --source="$(git config --get remote.origin.url)" \
            --revision="${{ github.ref_name }}@sha1:$(git rev-parse HEAD)"

      - name: Tag latest
        if: "!contains(github.ref_name, '-rc.') && !contains(github.ref_name, '-beta.') && !contains(github.ref_name, '-alpha.')"
        run: |
          flux tag artifact oci://${{ env.REGISTRY }}/${{ env.MANIFESTS_REPO }}:${{ github.ref_name }} --tag latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/install.yaml
          generate_release_notes: true
